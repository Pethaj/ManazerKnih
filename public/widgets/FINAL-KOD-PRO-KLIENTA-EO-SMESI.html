<!-- 5️⃣ JavaScript funkce -->
<script>
// Otevřít chat
function openEOSmesiChat() {
  const wrapper = document.getElementById('eo-smesi-chat-wrapper');
  const overlay = document.getElementById('eo-smesi-chat-overlay');
  
  // Zobraz overlay
  overlay.style.visibility = 'visible';
  overlay.style.opacity = '1';
  
  // Zobraz wrapper s animací
  wrapper.style.visibility = 'visible';
  setTimeout(() => {
    wrapper.style.opacity = '1';
    wrapper.style.transform = 'translate(-50%, -50%) scale(1)';
  }, 10);
  
  console.log('✅ EO Směsi Chat otevřen');
}

// Zavřít chat
function closeEOSmesiChat() {
  const wrapper = document.getElementById('eo-smesi-chat-wrapper');
  const overlay = document.getElementById('eo-smesi-chat-overlay');
  
  // Skryj s animací
  wrapper.style.opacity = '0';
  wrapper.style.transform = 'translate(-50%, -50%) scale(0.95)';
  overlay.style.opacity = '0';
  
  setTimeout(() => {
    wrapper.style.visibility = 'hidden';
    overlay.style.visibility = 'hidden';
  }, 300);
  
  console.log('❌ EO Směsi Chat zavřen');
}

// Klávesová zkratka ESC pro zavření
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') {
    const wrapper = document.getElementById('eo-smesi-chat-wrapper');
    if (wrapper && wrapper.style.visibility === 'visible') {
      closeEOSmesiChat();
    }
  }
});
</script>
